<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRB NTPC Modern Mock Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-header">
    <div class="exam-title">RRB NTPC Undergraduate CBT 2</div>

    <div class="top-actions">
      <button>ℹ Instructions</button>
      <button>📄 Question Paper</button>
      <button id="themeToggle">🌙 Dark Mode</button>
    </div>
  </header>

  <main class="exam-container">

    <section class="question-area">

      <div class="question-top">
        <h3>Question No. 1</h3>
        <div class="timer">Time Left: <span id="timer">90:00</span></div>
      </div>

      <div class="marking">
        Marks for correct answer: <b>1</b> | Negative Marks: <b>1/3</b>
      </div>

      <div class="language-box">
        View in:
        <select>
          <option>English</option>
          <option>Telugu</option>
          <option>Hindi</option>
        </select>
      </div>

      <div class="question-card">
        <p class="question-text"></p>

        <label class="option">
          <input type="radio" name="answer" />
        </label>

        <label class="option">
          <input type="radio" name="answer" />
        </label>

        <label class="option">
          <input type="radio" name="answer" />
        </label>

        <label class="option">
          <input type="radio" name="answer" />
        </label>
      </div>

      <div class="bottom-buttons">
        <button class="clear-btn">Clear Response</button>
        <button class="review-btn">Mark for Review & Next</button>
        <button class="next-btn">Save & Next</button>
        <button class="bookmark-btn">
  ⭐ Bookmark
</button>

<button class="report-btn">
  🚩 Report Error
</button>
      </div>

    </section>

    <aside class="side-panel">

      <div class="profile-box">
        <div class="avatar">👤</div>
        <h4 id="student-name">Student</h4>
      </div>

      <div class="legend">
        <div><span class="badge answered">0</span> Answered</div>
        <div><span class="badge not-answered">0</span> Not Answered</div>
        <div><span class="badge not-visited">0</span> Not Visited</div>
        <div><span class="badge review">0</span> Marked for Review</div>
      </div>

      <h3 class="choose-title">Choose a Question</h3>

      <div class="question-grid"></div>

      <button class="submit-btn">Submit Test</button>

    </aside>

  </main>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
